<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Cinno</title>
    <style>
      body { margin: 0; background: #1A0A14; }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1A0A14;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .splash-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: splash-in 0.5s ease-out;
      }
      .splash-mark {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-name {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #F5F0EB;
        letter-spacing: 0.5px;
      }
      @keyframes splash-in {
        from { opacity: 0; transform: scale(0.9); }
        to   { opacity: 1; transform: scale(1); }
      }
    </style>
    <script>
      try {
        var t = JSON.parse(localStorage.getItem("cc_theme"));
        if (t === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          document.querySelector("style").textContent += "#splash{background:#F4F1ED} .splash-name{color:#1A1618} body{background:#F4F1ED}";
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">
        <div class="splash-mark">
          <svg width="64" height="64" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="splash-hinge-glow" cx="0.25" cy="0.48" r="0.15">
                <stop offset="0%" stop-color="#D4B05C" stop-opacity="0.25"/>
                <stop offset="100%" stop-color="#D4B05C" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect x="4" y="4" width="120" height="120" rx="28" fill="#8B2040"/>
            <circle cx="32" cy="56" r="16" fill="url(#splash-hinge-glow)"/>
            <rect x="32" y="56" width="66" height="34" rx="4" fill="#F5F0EB" opacity="0.04"/>
            <rect x="32" y="56" width="66" height="34" rx="4" fill="none" stroke="#F5F0EB" stroke-width="3.5" opacity="0.9"/>
            <line x1="32" y1="56" x2="98" y2="56" stroke="#F5F0EB" stroke-width="3.5" opacity="0.9"/>
            <line x1="32" y1="56" x2="96" y2="34" stroke="#F5F0EB" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="48" y1="52.5" x2="51" y2="41" stroke="#D4B05C" stroke-width="2.8" stroke-linecap="round" opacity="0.55"/>
            <line x1="62" y1="50.5" x2="65" y2="39" stroke="#D4B05C" stroke-width="2.8" stroke-linecap="round" opacity="0.55"/>
            <line x1="76" y1="48.5" x2="79" y2="37" stroke="#D4B05C" stroke-width="2.8" stroke-linecap="round" opacity="0.55"/>
            <circle cx="32" cy="56" r="4.5" fill="none" stroke="#D4B05C" stroke-width="2.2" opacity="0.7"/>
            <circle cx="32" cy="56" r="3" fill="#D4B05C"/>
          </svg>
        </div>
        <div class="splash-name">Cinno</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
