<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Cinno</title>
    <style>
      body { margin: 0; background: #1A0A14; }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1A0A14;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .splash-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: splash-in 0.5s ease-out;
      }
      .splash-mark {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-name {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #F5F0EB;
        letter-spacing: 0.5px;
      }
      @keyframes splash-in {
        from { opacity: 0; transform: scale(0.9); }
        to   { opacity: 1; transform: scale(1); }
      }
    </style>
    <script>
      try {
        var t = JSON.parse(localStorage.getItem("cc_theme"));
        if (t === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          document.querySelector("style").textContent += "#splash{background:#F4F1ED} .splash-name{color:#1A1618} body{background:#F4F1ED}";
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">
        <div class="splash-mark">
          <svg width="64" height="64" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="splash-grad" x1="0.5" y1="0" x2="0.5" y2="0.55">
                <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.4"/>
                <stop offset="40%" stop-color="#C9A84C" stop-opacity="0.12"/>
                <stop offset="100%" stop-color="#8B2040" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <rect x="4" y="4" width="120" height="120" rx="28" fill="#8B2040"/>
            <path d="M48,4 L80,4 Q86,28 92,58 L64,64 L36,58 Q42,28 48,4Z" fill="url(#splash-grad)"/>
            <text x="64" y="82" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="72" fill="#F5F0EB">c</text>
          </svg>
        </div>
        <div class="splash-name">Cinno</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
